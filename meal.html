  <style>
    .meal-calendar-panel {
      display: grid;
      gap: 18px;
    }

    .meal-calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .meal-calendar-header h3 {
      margin: 0;
      font-size: 1.2rem;
    }

    .meal-day-panel {
      padding: 18px;
      border-radius: 20px;
      background: #f7f9fd;
      border: 1px solid rgba(20, 48, 79, 0.12);
    }

    .meal-day-panel p {

<body>
  <a class="skip-link" href="#main">본문 바로가기</a>

        <a class="brand brand-link" href="index.html#pages" aria-label="메인 메뉴로 이동">

        <div class="header-actions">

    <main id="main">
      <section class="page-hero">
        <div class="page-hero-card">
          <div>
            <p class="hero-kicker">식단표</p>
            <h2>실제 급식 정보</h2>
            <p>NEIS OPEN API에서 불러온 덕원고등학교 급식 정보를 월별 달력으로 확인하세요.</p>

            <img src="assets/meal.svg" alt="급식 안내 이미지" />

        </div>
      </section>

      <section class="feature-grid" id="meal-page">
        <article class="section-block meal-calendar-panel">
          <div class="meal-calendar-header">
            <h3 id="meal-month-title">급식 월 정보</h3>
            <div class="slider-controls">
              <button type="button" class="ghost-btn" id="meal-prev-month">이전</button>
              <button type="button" class="ghost-btn" id="meal-next-month">다음</button>
            </div>
          </div>
          <p id="meal-status">급식 정보를 불러오는 중...</p>
          <div class="calendar-shell">
            <div class="calendar-grid" id="meal-calendar-grid" aria-label="급식 달력"></div>
          </div>
        </article>

        <article class="section-block meal-day-panel">
          <p id="meal-day-date">날짜를 선택하세요.</p>
          <div class="schedule-detail">
            <strong id="meal-day-title">중식 식단</strong>
            <ul class="meal-list" id="meal-day-list">
              <li>달력에서 날짜를 선택하면 식단이 표시됩니다.</li>
